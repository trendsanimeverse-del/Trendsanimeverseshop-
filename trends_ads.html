<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendsAnimeVerseShop — Gerador de Anúncios</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --dark: #080808;
  --dark2: #111;
  --dark3: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e0d0;
  --muted: #555;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px 80px;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeDown 0.6s ease both;
}

.logo-star {
  font-size: 2.4rem;
  margin-bottom: 12px;
  display: block;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.05em;
  line-height: 1.2;
}

.tagline {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 8px;
}

/* Form card */
.card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 24px;
  animation: fadeUp 0.6s ease both;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.field {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

input, textarea, select {
  width: 100%;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.88rem;
  transition: border-color 0.2s;
  outline: none;
  resize: vertical;
}

input:focus, textarea:focus, select:focus {
  border-color: var(--gold);
}

select option { background: var(--dark3); }

.plataformas {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.plat-btn {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.plat-btn.active {
  background: rgba(201,168,76,0.12);
  border-color: var(--gold);
  color: var(--gold);
}

.btn-gerar {
  width: 100%;
  background: linear-gradient(135deg, #c9a84c, #f0d080, #c9a84c);
  background-size: 200% 100%;
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.3s;
  animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.btn-gerar:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-gerar:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Loading */
.loading {
  text-align: center;
  padding: 40px;
  display: none;
}

.loading-dots {
  display: inline-flex;
  gap: 6px;
  margin-bottom: 16px;
}

.loading-dots span {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.loading p { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; }

/* Resultado */
.resultado {
  display: none;
  animation: fadeUp 0.5s ease both;
}

.resultado-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.resultado-titulo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  color: var(--gold);
}

.btn-copiar {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.btn-copiar:hover { border-color: var(--gold); color: var(--gold); }

.secao {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
}

.secao-label {
  font-size: 0.65rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.secao-conteudo {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
}

.hashtags-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.hashtag {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 0.78rem;
  color: var(--gold-light);
}

.btn-novo {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.btn-novo:hover { border-color: var(--gold); color: var(--gold); }

/* Animações */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.copiado {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: #000;
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 99;
}

.copiado.show { opacity: 1; }

/* Divisor */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 24px 0;
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <span class="logo-star">⭐</span>
    <h1>TrendsAnimeVerseShop</h1>
    <p class="tagline">Gerador de Anúncios com IA · Luxury Home Décor</p>
  </div>

  <!-- Formulário -->
  <div class="card" id="formCard">
    <div class="card-title">✦ Descreve o teu produto</div>

    <div class="field">
      <label>Nome do produto</label>
      <input type="text" id="nomeProduto" placeholder="ex: Candeeiro Arc Dourado" />
    </div>

    <div class="field">
      <label>Descrição / características</label>
      <textarea id="descricao" rows="3" placeholder="ex: Altura 180cm, base de mármore, cabo dourado, moderno e elegante..."></textarea>
    </div>

    <div class="field">
      <label>Preço</label>
      <input type="text" id="preco" placeholder="ex: 4500 MT" />
    </div>

    <div class="field">
      <label>Público alvo</label>
      <select id="publico">
        <option value="geral">Geral — Moçambique</option>
        <option value="jovens">Jovens adultos (18-30)</option>
        <option value="premium">Clientes premium / luxo</option>
        <option value="casais">Casais / noivos</option>
        <option value="negocios">Empresas / escritórios</option>
      </select>
    </div>

    <div class="field">
      <label>Plataformas</label>
      <div class="plataformas" id="plataformas">
        <button class="plat-btn active" data-p="Instagram">Instagram</button>
        <button class="plat-btn" data-p="Facebook">Facebook</button>
        <button class="plat-btn" data-p="WhatsApp">WhatsApp</button>
        <button class="plat-btn" data-p="TikTok">TikTok</button>
      </div>
    </div>

    <div class="field">
      <label>Tom do anúncio</label>
      <select id="tom">
        <option value="luxo">Luxo & exclusividade</option>
        <option value="urgencia">Urgência & promoção</option>
        <option value="emocional">Emocional & lifestyle</option>
        <option value="direto">Direto & informativo</option>
      </select>
    </div>

    <hr class="divider">

    <button class="btn-gerar" id="btnGerar" onclick="gerar()">✦ Gerar Anúncio com IA</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p>A criar o teu anúncio perfeito...</p>
  </div>

  <!-- Resultado -->
  <div class="resultado" id="resultado">
    <div class="card">
      <div class="resultado-header">
        <span class="resultado-titulo">✦ Anúncio gerado</span>
        <button class="btn-copiar" onclick="copiarTudo()">Copiar tudo</button>
      </div>

      <div class="secao" id="secTitulo">
        <div class="secao-label">🎯 Título / Hook</div>
        <div class="secao-conteudo" id="txtTitulo"></div>
      </div>

      <div class="secao" id="secLegenda">
        <div class="secao-label">📝 Legenda completa</div>
        <div class="secao-conteudo" id="txtLegenda"></div>
      </div>

      <div class="secao" id="secHashtags">
        <div class="secao-label"># Hashtags</div>
        <div class="hashtags-wrap" id="txtHashtags"></div>
      </div>

      <div class="secao" id="secVideo">
        <div class="secao-label">🎬 Ideia de vídeo / imagem</div>
        <div class="secao-conteudo" id="txtVideo"></div>
      </div>

      <div class="secao" id="secWhatsapp">
        <div class="secao-label">💬 Mensagem WhatsApp</div>
        <div class="secao-conteudo" id="txtWhatsapp"></div>
      </div>

      <button class="btn-novo" onclick="novoAnuncio()">↺ Criar novo anúncio</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="copiado" id="toastCopiado">✓ Copiado!</div>

<script>
// Plataformas toggle
document.querySelectorAll('.plat-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('active'));
});

function getPlataformas() {
  return [...document.querySelectorAll('.plat-btn.active')].map(b => b.dataset.p).join(', ') || 'Instagram';
}

async function gerar() {
  const nome = document.getElementById('nomeProduto').value.trim();
  const desc = document.getElementById('descricao').value.trim();
  const preco = document.getElementById('preco').value.trim();
  const publico = document.getElementById('publico').value;
  const tom = document.getElementById('tom').value;
  const plats = getPlataformas();

  if (!nome) { alert('Escreve o nome do produto!'); return; }

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('btnGerar').disabled = true;

  const publicoMap = {
    geral: 'público geral em Moçambique',
    jovens: 'jovens adultos entre 18-30 anos',
    premium: 'clientes premium que valorizam luxo e exclusividade',
    casais: 'casais e noivos a decorar a casa',
    negocios: 'empresas e escritórios'
  };

  const tomMap = {
    luxo: 'tom de luxo, exclusividade e sofisticação',
    urgencia: 'tom de urgência, oferta limitada e promoção',
    emocional: 'tom emocional, lifestyle e aspiracional',
    direto: 'tom direto, claro e informativo'
  };

  const prompt = `És um especialista em marketing digital e copywriting para a loja TrendsAnimeVerseShop — uma loja online premium em Moçambique que vende móveis e decoração de luxo para casa.

PRODUTO: ${nome}
DESCRIÇÃO: ${desc || 'produto de alta qualidade'}
PREÇO: ${preco || 'contactar para preço'}
PÚBLICO: ${publicoMap[publico]}
PLATAFORMAS: ${plats}
TOM: ${tomMap[tom]}

Cria um anúncio completo e profissional. Responde APENAS em JSON válido sem markdown, neste formato exato:
{
  "titulo": "hook poderoso de 1-2 linhas para parar o scroll",
  "legenda": "legenda completa pronta para publicar com emojis, call to action e link na bio. 3-5 parágrafos.",
  "hashtags": ["hashtag1", "hashtag2", "hashtag3", "hashtag4", "hashtag5", "hashtag6", "hashtag7", "hashtag8", "hashtag9", "hashtag10", "hashtag11", "hashtag12", "hashtag13", "hashtag14", "hashtag15"],
  "video": "descrição detalhada de como fazer o vídeo ou foto do produto: cenário, iluminação, ângulos, texto a colocar, música sugerida",
  "whatsapp": "mensagem curta e direta para enviar no WhatsApp com o produto e preço"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const texto = data.content[0].text;
    const clean = texto.replace(/```json|```/g, '').trim();
    const json = JSON.parse(clean);

    document.getElementById('txtTitulo').textContent = json.titulo;
    document.getElementById('txtLegenda').textContent = json.legenda;
    document.getElementById('txtVideo').textContent = json.video;
    document.getElementById('txtWhatsapp').textContent = json.whatsapp;

    const hashWrap = document.getElementById('txtHashtags');
    hashWrap.innerHTML = '';
    (json.hashtags || []).forEach(h => {
      const span = document.createElement('span');
      span.className = 'hashtag';
      span.textContent = h.startsWith('#') ? h : '#' + h;
      hashWrap.appendChild(span);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('resultado').style.display = 'block';

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('formCard').style.display = 'block';
    document.getElementById('btnGerar').disabled = false;
    alert('Erro ao gerar. Tenta de novo!');
  }
}

function novoAnuncio() {
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('btnGerar').disabled = false;
  document.getElementById('nomeProduto').value = '';
  document.getElementById('descricao').value = '';
  document.getElementById('preco').value = '';
}

function copiarTudo() {
  const titulo = document.getElementById('txtTitulo').textContent;
  const legenda = document.getElementById('txtLegenda').textContent;
  const hashtags = [...document.querySelectorAll('.hashtag')].map(h => h.textContent).join(' ');
  const video = document.getElementById('txtVideo').textContent;
  const whatsapp = document.getElementById('txtWhatsapp').textContent;

  const tudo = `${titulo}\n\n${legenda}\n\n${hashtags}\n\n---\n🎬 IDEIA DE VÍDEO:\n${video}\n\n---\n💬 WHATSAPP:\n${whatsapp}`;

  navigator.clipboard.writeText(tudo).then(() => {
    const toast = document.getElementById('toastCopiado');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
</script>
</body>
</html>
